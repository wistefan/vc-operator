name: Release

on:
  workflow_call:
    inputs:
      version:
        required: false
        type: string
        default: ""
    secrets:
      QUAY_USERNAME:
        required: true
      QUAY_PASSWORD:
        required: true

env:
  REGISTRY: quay.io
  REPOSITORY: seamware
  IMAGE_NAME: vc-operator

jobs:
  generate-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      has_version: ${{ steps.version.outputs.has_version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: pr
        if: inputs.version == ''
        uses: actions-ecosystem/action-get-merged-pull-request@v1.0.1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Detect semver label
        if: inputs.version == ''
        id: label
        run: |
          BUMP=""
          while IFS= read -r label; do
            case "$label" in
              major|minor|patch) BUMP="$label"; break ;;
            esac
          done <<< "${{ steps.pr.outputs.labels }}"
          echo "bump=$BUMP" >> $GITHUB_OUTPUT
          [[ -n "$BUMP" ]] && echo "has_bump=true" >> $GITHUB_OUTPUT || echo "has_bump=false" >> $GITHUB_OUTPUT

      - uses: zwaldowski/semver-release-action@v6
        if: inputs.version == '' && steps.label.outputs.has_bump == 'true'
        id: semver
        with:
          dry_run: true
          bump: ${{ steps.label.outputs.bump }}
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set version output
        id: version
        run: |
          if [[ -n "${{ inputs.version }}" ]]; then
            echo "version=${{ inputs.version }}" >> $GITHUB_OUTPUT
            echo "has_version=true" >> $GITHUB_OUTPUT
          elif [[ "${{ steps.label.outputs.has_bump }}" == "true" ]]; then
            echo "version=${{ steps.semver.outputs.version }}" >> $GITHUB_OUTPUT
            echo "has_version=true" >> $GITHUB_OUTPUT
          else
            echo "has_version=false" >> $GITHUB_OUTPUT
          fi

  build-scan-push:
    needs: generate-version
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v4

      - name: Build image for scanning
        uses: docker/build-push-action@v7
        with:
          context: .
          load: true
          tags: local/${{ env.IMAGE_NAME }}:scan
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - uses: aquasecurity/trivy-action@v0.36.0
        continue-on-error: true
        with:
          image-ref: local/${{ env.IMAGE_NAME }}:scan
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH

      - uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-results.sarif

      - uses: docker/setup-qemu-action@v4

      - uses: docker/login-action@v4
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_PASSWORD }}

      - name: Build and push
        if: needs.generate-version.outputs.has_version == 'true'
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}:${{ needs.generate-version.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  git-release:
    needs:
      - generate-version
      - build-scan-push
    if: needs.generate-version.outputs.has_version == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: marvinpinto/action-automatic-releases@latest
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          automatic_release_tag: ${{ needs.generate-version.outputs.version }}
          prerelease: false
          title: ${{ needs.generate-version.outputs.version }}
          files: |
            LICENSE
