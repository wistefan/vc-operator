apiVersion: vc.vc-operator.io/v1alpha1
kind: VerifiableCredentialRequest
metadata:
  labels:
    app.kubernetes.io/name: vc-operator
    app.kubernetes.io/managed-by: kustomize
  name: verifiablecredentialrequest-sample
spec:
  # Reference to a CredentialIssuer in the same namespace.
  issuerRef:
    name: credentialissuer-sample
  # The credential type to request (as advertised in the issuer's metadata).
  credentialType: "VerifiableCredential"
  # The credential format. Supported: "jwt_vc_json", "ldp_vc", "jwt_vc", "vc+sd-jwt".
  format: jwt_vc_json
  # Storage backend. Currently only "kubernetes" is supported.
  storageType: kubernetes
  # Where to store the obtained credential.
  targetSecretRef:
    name: my-service-credential
    key: credential
  # How long before expiry to attempt renewal.
  renewBefore: 5m
  # Optional: additional claims to include in the credential request.
  # additionalClaims:
  #   scope: "openid"
