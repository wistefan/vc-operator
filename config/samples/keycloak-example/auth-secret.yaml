# Authentication Secret for the Keycloak OID4VCI issuer.
# Contains the OAuth 2.0 client credentials used by the operator to obtain
# access tokens from the Keycloak token endpoint.
#
# Replace the base64-encoded values below with your actual Keycloak client
# credentials:
#   echo -n "your-client-id" | base64
#   echo -n "your-client-secret" | base64
apiVersion: v1
kind: Secret
metadata:
  name: keycloak-vc-credentials
  labels:
    app.kubernetes.io/name: vc-operator
    app.kubernetes.io/component: auth
type: Opaque
data:
  # OAuth 2.0 client_id registered in Keycloak for credential issuance.
  client_id: "bXktdmMtY2xpZW50"          # base64("my-vc-client")
  # OAuth 2.0 client_secret for the above client.
  client_secret: "bXktY2xpZW50LXNlY3JldA==" # base64("my-client-secret")
