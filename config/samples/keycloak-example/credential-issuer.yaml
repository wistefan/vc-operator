# CredentialIssuer pointing to a Keycloak realm with OID4VCI support.
#
# The operator will:
#   1. Discover OID4VCI metadata at {issuerURL}/.well-known/openid-credential-issuer
#   2. Validate that the referenced auth Secret exists and has valid keys
#   3. Cache discovered metadata (credential endpoint, token endpoint, supported types)
#   4. Periodically refresh metadata (every 30 minutes)
apiVersion: vc.vc-operator.io/v1alpha1
kind: CredentialIssuer
metadata:
  name: keycloak-issuer
  labels:
    app.kubernetes.io/name: vc-operator
    app.kubernetes.io/managed-by: kustomize
spec:
  # Base URL of the Keycloak realm. Replace with your actual Keycloak URL.
  issuerURL: "https://keycloak.example.com/realms/vc-issuer"

  # Issuer implementation type. Use "keycloak" for Keycloak instances.
  # Supported values: "generic", "keycloak".
  issuerType: keycloak

  # Reference to the Secret containing OAuth 2.0 client credentials.
  # The Secret must have "client_id" and "client_secret" keys.
  authSecretRef:
    name: keycloak-vc-credentials

  # Optional: override the token endpoint discovered from metadata.
  # Uncomment if your Keycloak uses a non-standard token endpoint.
  # tokenURL: "https://keycloak.example.com/realms/vc-issuer/protocol/openid-connect/token"
