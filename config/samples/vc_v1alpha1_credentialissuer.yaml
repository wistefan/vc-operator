apiVersion: vc.vc-operator.io/v1alpha1
kind: CredentialIssuer
metadata:
  labels:
    app.kubernetes.io/name: vc-operator
    app.kubernetes.io/managed-by: kustomize
  name: credentialissuer-sample
spec:
  # The base URL of the OID4VCI credential issuer.
  # The operator discovers metadata at {issuerURL}/.well-known/openid-credential-issuer
  issuerURL: "https://keycloak.example.com/realms/vc-issuer"
  # The issuer implementation type. Supported: "generic", "keycloak".
  issuerType: keycloak
  # Reference to a Secret containing authentication credentials.
  # The Secret must contain "client_id" and "client_secret" keys.
  authSecretRef:
    name: keycloak-vc-credentials
  # Optional: override the token endpoint discovered from metadata.
  # tokenURL: "https://keycloak.example.com/realms/vc-issuer/protocol/openid-connect/token"
