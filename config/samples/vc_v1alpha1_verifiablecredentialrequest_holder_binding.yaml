apiVersion: vc.vc-operator.io/v1alpha1
kind: VerifiableCredentialRequest
metadata:
  labels:
    app.kubernetes.io/name: vc-operator
    app.kubernetes.io/managed-by: kustomize
  name: vcrequest-with-holder-binding
spec:
  # Reference to a CredentialIssuer in the same namespace.
  issuerRef:
    name: credentialissuer-sample
  # The credential type to request.
  credentialType: "VerifiableCredential"
  format: jwt_vc_json
  storageType: kubernetes
  targetSecretRef:
    name: my-service-credential
    key: credential
  renewBefore: 5m

  # Holder identity binding (optional).
  # References a Secret containing the holder's ECDSA P-256 private key in PEM format.
  # The operator uses this key to sign a proof-of-possession JWT, causing the issuer
  # to bind the credential to this key's identity.
  holderKeyRef:
    name: my-holder-key

  # Optional: DID URL to use in the proof JWT "kid" header instead of embedding the
  # full JWK. The DID must resolve to the public key from holderKeyRef.
  holderDID: "did:key:zDnaerDaTF5BXEavCrfRZEk316dpbLsfPDZ3WJ5hRTPFU2169"
---
# The holder key Secret contains the ECDSA P-256 private key in PEM format.
# Generate one with: openssl ecparam -genkey -name prime256v1 -noout -out key.pem
apiVersion: v1
kind: Secret
metadata:
  name: my-holder-key
type: Opaque
stringData:
  key.pem: |
    -----BEGIN EC PRIVATE KEY-----
    <base64-encoded ECDSA P-256 private key>
    -----END EC PRIVATE KEY-----
